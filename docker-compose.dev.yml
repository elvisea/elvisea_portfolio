services:
  portfolio:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    image: elvisea/${CONTAINER_NAME_APP}:latest
    container_name: ${CONTAINER_NAME_APP}
    restart: unless-stopped
    ports:
      - "3003:3003"
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    # Variáveis vêm só do .env (env_file). Evita duplicar e evita ${VAR} vazio a sobrescrever o ficheiro.
    environment:
      NEXT_PUBLIC_NODE_ENV: development

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      update_config:
        order: start-first
        failure_action: rollback
    command: npm run dev
