name: Production Release
run-name: Release from ${{ github.ref_name }} by @${{ github.actor }}

# =============================================================================
# RELEASE — semantic versioning + Docker image to GHCR + deploy via SSH
# =============================================================================
#
# Flow: release → docker → deploy (sequential, no race condition)
#
# On push to main:
#   1. semantic-release creates tag/release
#   2. Docker job pushes ghcr.io/<owner>/elvisea-portfolio:<version> and :latest
#   3. Deploy job pulls the image and restarts the container on the remote server
#
# Requires repository secret GH_TOKEN (PAT). Name must be exactly GH_TOKEN.
# Classic: scope "repo". Fine-grained: this repo + Contents read/write + Metadata read.
# If the log shows "GITHUB_TOKEN:" with no value, secrets.GH_TOKEN is missing on THIS repo.
# persist-credentials: false means git push uses only this PAT (not the default Actions token).
# The job docker/login uses secrets.GITHUB_TOKEN (automatic) for GHCR — that is separate.
#
# =============================================================================

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/elvisea-portfolio

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install semantic-release
        run: |
          npm install -g \
            semantic-release \
            @semantic-release/changelog \
            @semantic-release/git \
            @semantic-release/github \
            @semantic-release/npm

      - name: Verify GH_TOKEN secret
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::Secret GH_TOKEN is empty or not defined on this repository. Add it under Settings → Secrets and variables → Actions (exact name GH_TOKEN). Use a PAT with push access to ${{ github.repository }}."
            exit 1
          fi

      - name: Semantic Release
        id: semantic
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          npx semantic-release 2>&1 | tee release-output.log

          VERSION=$(grep -oP 'Published release \K[0-9]+\.[0-9]+\.[0-9]+' release-output.log || echo "")

          if [ -n "$VERSION" ]; then
            echo "new_release_published=true" >> $GITHUB_OUTPUT
            echo "new_release_version=$VERSION" >> $GITHUB_OUTPUT
            echo "Published release: $VERSION"
          else
            echo "new_release_published=false" >> $GITHUB_OUTPUT
            echo "No new release published"
          fi

  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.new_release_published == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.release.outputs.new_release_version }}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          target: runner
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          build-args: |
            NEXT_PUBLIC_FIREBASE_API_KEY=${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
            NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
            NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
            NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
            NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
            NEXT_PUBLIC_FIREBASE_APP_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
            NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID }}
            ACCESS_TOKEN_GITHUB=${{ secrets.ACCESS_TOKEN_GITHUB }}

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [release, docker]
    if: needs.release.outputs.new_release_published == 'true'
    environment: production
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.release.outputs.new_release_version }}

      - name: Create SSH key
        run: |
          mkdir -p ~/.ssh/
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H -p "${{ secrets.REMOTE_PORT }}" "${{ secrets.REMOTE_HOST }}" >> ~/.ssh/known_hosts || true

      - name: Check and Create Target Directory
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.REMOTE_PORT }} ${{ secrets.REMOTE_USER }}@${{ secrets.REMOTE_HOST }} "
            if [ ! -d \"${{ secrets.REMOTE_TARGET }}\" ]; then
              echo 'Target directory does not exist. Creating...' && \
              mkdir -p ${{ secrets.REMOTE_TARGET }} && \
              echo 'Directory created successfully.';
            else
              echo 'Target directory already exists.';
            fi
          "

      - name: Transfer Docker Compose and .env
        run: |
          set -e
          {
            echo "REGISTRY=${{ env.REGISTRY }}"
            echo "IMAGE_NAME=${{ env.IMAGE_NAME }}"
            echo "TAG=${{ needs.release.outputs.new_release_version }}"
            echo "CONTAINER_NAME_APP=${{ secrets.CONTAINER_NAME_APP }}"
            echo "NEXT_PUBLIC_NODE_ENV=production"
            echo "NEXT_PUBLIC_SITE_URL=${{ secrets.NEXT_PUBLIC_SITE_URL }}"
            echo "NEXT_PUBLIC_CREATOR_NAME=${{ secrets.NEXT_PUBLIC_CREATOR_NAME }}"
            echo "NEXT_PUBLIC_CREATOR_ROLE=${{ secrets.NEXT_PUBLIC_CREATOR_ROLE }}"
            echo "NEXT_PUBLIC_EMAIL_CONTACT=${{ secrets.NEXT_PUBLIC_EMAIL_CONTACT }}"
            echo "NEXT_PUBLIC_PHONE_NUMBER=${{ secrets.NEXT_PUBLIC_PHONE_NUMBER }}"
            echo "SMTP_HOST=${{ secrets.SMTP_HOST }}"
            echo "SMTP_PORT=${{ secrets.SMTP_PORT }}"
            echo "SMTP_USER=${{ secrets.SMTP_USER }}"
            echo "SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}"
            echo "SMTP_USER_NO_REPLY=${{ secrets.SMTP_USER_NO_REPLY }}"
            echo "EMAIL_CONTACT=${{ secrets.EMAIL_CONTACT }}"
            echo "PHONE_NUMBER=${{ secrets.PHONE_NUMBER }}"
            echo "NEXT_PUBLIC_MAP_COORDINATES=${{ secrets.NEXT_PUBLIC_MAP_COORDINATES }}"
            echo "NEXT_PUBLIC_GITHUB_USERNAME=${{ secrets.NEXT_PUBLIC_GITHUB_USERNAME }}"
            echo "NEXT_PUBLIC_GITHUB_API_URL=${{ secrets.NEXT_PUBLIC_GITHUB_API_URL }}"
            echo "ACCESS_TOKEN_GITHUB=${{ secrets.ACCESS_TOKEN_GITHUB }}"
            echo "NEXT_PUBLIC_GITHUB_URL=${{ secrets.NEXT_PUBLIC_GITHUB_URL }}"
            echo "NEXT_PUBLIC_LINKEDIN_URL=${{ secrets.NEXT_PUBLIC_LINKEDIN_URL }}"
            echo "NEXT_PUBLIC_FIREBASE_API_KEY=${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}"
            echo "NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}"
            echo "NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}"
            echo "NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}"
            echo "NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}"
            echo "NEXT_PUBLIC_FIREBASE_APP_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}"
            echo "NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID }}"
          } > .env

          scp -i ~/.ssh/deploy_key -P ${{ secrets.REMOTE_PORT }} \
            docker-compose.yml .env \
            ${{ secrets.REMOTE_USER }}@${{ secrets.REMOTE_HOST }}:${{ secrets.REMOTE_TARGET }}

      - name: Login to GitHub Container Registry on Remote Server
        run: |
          TOKEN="${{ secrets.GH_TOKEN }}"

          if [ -z "$TOKEN" ]; then
            echo "ERROR: GH_TOKEN is not set"
            exit 1
          fi

          echo "Logging in to GitHub Container Registry on remote..."
          echo "$TOKEN" | ssh -i ~/.ssh/deploy_key -p ${{ secrets.REMOTE_PORT }} ${{ secrets.REMOTE_USER }}@${{ secrets.REMOTE_HOST }} \
            "docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin" || {
            echo "ERROR: Remote docker login failed"
            echo "Ensure GH_TOKEN has read:packages and the PAT owner matches github.actor (or use a bot account with package access)."
            exit 1
          }

          echo "Remote GHCR login succeeded"

      - name: Clean up orphaned containers
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.REMOTE_PORT }} ${{ secrets.REMOTE_USER }}@${{ secrets.REMOTE_HOST }} "\
            cd ${{ secrets.REMOTE_TARGET }} && \
            docker compose down --remove-orphans || true && \
            docker container prune -f || true"

      - name: Deploy to Server via SSH
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.REMOTE_PORT }} \
            -o ServerAliveInterval=60 \
            -o ServerAliveCountMax=3 \
            -o ConnectTimeout=30 \
            ${{ secrets.REMOTE_USER }}@${{ secrets.REMOTE_HOST }} "
            cd ${{ secrets.REMOTE_TARGET }} && \
            echo 'Deploying portfolio v${{ needs.release.outputs.new_release_version }}' && \
            docker compose down --remove-orphans && \
            MAX_RETRIES=3 && \
            RETRY_COUNT=0 && \
            while [ \$RETRY_COUNT -lt \$MAX_RETRIES ]; do
              if docker compose pull --quiet; then
                echo 'Pull succeeded' && break
              else
                RETRY_COUNT=\$((RETRY_COUNT + 1)) && \
                if [ \$RETRY_COUNT -lt \$MAX_RETRIES ]; then
                  echo \"Pull failed, retry \$RETRY_COUNT/\$MAX_RETRIES\" && sleep 10
                else
                  echo 'ERROR: pull failed after '\$MAX_RETRIES' attempts' && exit 1
                fi
              fi
            done && \
            docker compose up -d --force-recreate && \
            docker image prune -f && \
            echo 'Portfolio v${{ needs.release.outputs.new_release_version }} deployed successfully'
          "

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/deploy_key
